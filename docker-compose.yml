services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: code-guardian-postgres
    environment:
      POSTGRES_DB: code_guardian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your environment}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/init_permissions.sql:/docker-entrypoint-initdb.d/02_init_permissions.sql
    restart: always

  redis:
    image: redis:7
    container_name: code-guardian-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in your environment}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: code-guardian-reranker
    command: ["--model-id", "${RAG_RERANKER_MODEL:-BAAI/bge-reranker-base}"]
    ports:
      - "8081:80"
    volumes:
      - reranker_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
  reranker_data:
