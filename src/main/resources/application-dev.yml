spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/code_guardian}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

logging:
  level:
    com.codeguardian: DEBUG
